services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      MEDINTELOS_ENVIRONMENT: development
      MEDINTELOS_API_KEY: ${MEDINTELOS_API_KEY:-local-development-key-change-me}
      MEDINTELOS_FHIR_BASE_URL: http://localhost:8080
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
